name: ci-linux

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  belowc-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p belowc_bin --release

      - name: Run Core Gates (G-06..G-19)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ci/run_all_remaining.sh
          ./ci/run_all_remaining.sh

      # Always upload evidence, even if previous step fails
      - name: Upload ci logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-linux
          path: ci/logs

      - name: Upload ci artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-linux
          path: ci/artifacts
