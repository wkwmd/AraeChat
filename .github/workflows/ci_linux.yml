name: ci-linux

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  belowc-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p belowc_bin --release

      - name: Run Core Gates (G-06..G-19)
        id: gates
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          chmod +x ci/run_all_remaining.sh
          ./ci/run_all_remaining.sh
      
      - name: Dump Log Artifacts on UI Failure
        if: steps.gates.outcome == 'failure'
        shell: bash
        run: |
          echo "=== SUMMARY ==="
          cat ci/logs/run_all_summary.txt || true
          echo "=== FIRST FAIL ==="
          for f in ci/logs/g*.txt; do
            if grep -q "STATUS: FAIL" "$f"; then
              echo "=> $f"
              head -n 30 "$f" || true
              break
            fi
          done
          exit 1

      # Always upload evidence, even if previous step fails
      - name: Upload ci logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-linux
          path: ci/logs

      - name: Upload ci artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-linux
          path: ci/artifacts
